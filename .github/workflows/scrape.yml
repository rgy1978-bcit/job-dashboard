name: Job Board Scraper

on:
  schedule:
    - cron: "0 7 * * 1,3,5"   # Mon/Wed/Fri 3am Eastern
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY:  ${{ secrets.ADZUNA_API_KEY }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL:   ${{ secrets.USAJOBS_EMAIL }}
        run: python scraper.py

      - name: Commit updated jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json
          # Only proceed if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to jobs.json — skipping commit"
            exit 0
          fi
          git commit -m "chore: update jobs.json [skip ci]"
          # Pull with rebase in case someone pushed while scraper was running
          git pull --rebase origin main
          git push
