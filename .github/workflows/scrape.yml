name: Job Board Scraper

on:
  # ---- Scheduled runs ----
  # Cron syntax: minute hour day-of-month month day-of-week (UTC)
  # Mon/Wed/Fri at 7 AM UTC (3 AM Eastern)
  schedule:
    - cron: "0 7 * * 1,3,5"

  # ---- Also allow manual trigger from GitHub Actions UI ----
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit jobs.json back to the repo

    steps:
      # 1. Check out repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run scraper
      - name: Run scraper
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
        run: python scraper.py

      # 5. Commit updated jobs.json back to repo
      #    The React app (GitHub Pages / Render) will pick it up automatically.
      - name: Commit updated jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json
          git diff --cached --quiet || git commit -m "chore: update jobs.json [skip ci]"
          git push
